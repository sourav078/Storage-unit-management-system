name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install Backend
        working-directory: ./backend
        run: |
          npm install

      - name: Run Tests
        working-directory: ./backend
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          PORT: ${{ secrets.PORT }}
        run: npm test

      - name: Install Frontend
        working-directory: ./frontend
        run: |
          npm install
          npm run build

      - name: Create .env
        run: |
          cd backend
          echo "${{ secrets.PROD }}" > .env

      - name: Restart Server
        run: |
          pm2 restart all || pm2 start backend/server.js --name backend